<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Training" />
  <title>Training Schema</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    input[type=number], input[type=text] {
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus { outline: none; border-color: #555 !important; }
    button { -webkit-appearance: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const SCHEMA = [
  {
    id: "push", label: "PUSH", sub: "Chest \u00b7 Shoulders \u00b7 Triceps", color: "#E8452C",
    exercises: [
      { id: "p4", name: "Lateral Raise", sets: "2\u00d712\u201315", type: "warmup" },
      { id: "p1", name: "Incline Dumbbell Press", sets: "2\u00d78\u201310", type: "compound" },
      { id: "p2", name: "Pec Fly (machine)", sets: "2\u00d710\u201312", type: "isolation" },
      { id: "p3", name: "Overhead Press (barbell/DB)", sets: "2\u00d78\u201310", type: "compound" },
      { id: "p5", name: "Tricep Pushdown (kabel)", sets: "2\u00d710\u201312", type: "isolation" },
    ]
  },
  {
    id: "pull", label: "PULL", sub: "Back \u00b7 Biceps \u00b7 Rear delt", color: "#2C6BE8",
    exercises: [
      { id: "r1", name: "Weighted Pull-ups", sets: "2\u00d76\u20138", type: "compound" },
      { id: "r2", name: "Lat Pulldown", sets: "2\u00d710\u201312", type: "compound" },
      { id: "r3", name: "Seated Cable Row (V-bar/wide wissel)", sets: "2\u00d710", type: "compound" },
      { id: "r4", name: "Rear Delt Fly (machine/kabel)", sets: "2\u00d712\u201315", type: "isolation" },
      { id: "r5", name: "Face Pull (kabel)", sets: "2\u00d715", type: "isolation" },
      { id: "r6", name: "Hammer Curl (DB)", sets: "2\u00d710\u201312", type: "isolation" },
      { id: "r7", name: "Bicep Curl (kabel achter / incline DB)", sets: "2\u00d710\u201312", type: "isolation" },
    ]
  },
  {
    id: "legs", label: "LEGS", sub: "Quads \u00b7 Hamstrings \u00b7 Glutes \u00b7 Calves", color: "#2CB87A",
    exercises: [
      { id: "l1", name: "Squat (barbell)", sets: "2\u00d76\u20138", type: "compound" },
      { id: "l2", name: "Romanian Deadlift", sets: "2\u00d710", type: "compound" },
      { id: "l3", name: "Leg Press", sets: "2\u00d712", type: "isolation" },
      { id: "l4", name: "Leg Curl (machine)", sets: "2\u00d712", type: "isolation" },
      { id: "l5", name: "Calf Raise (standing)", sets: "2\u00d715", type: "isolation" },
    ]
  },
  {
    id: "abs", label: "ABS", sub: "Kracht \u00b7 Core opbouw", color: "#C47D00",
    exercises: [
      { id: "a1", name: "Cable Crunch", sets: "2\u00d78\u201312", type: "isolation" },
      { id: "a2", name: "Hanging Leg Raise", sets: "2\u00d78\u201312", type: "isolation" },
      { id: "a3", name: "Ab Wheel Rollout", sets: "2\u00d76\u201310", type: "isolation" },
    ]
  },
  {
    id: "run", label: "RUN", sub: "Hardlopen", color: "#8B3FBF",
    exercises: [
      { id: "ru1", name: "Afstand (km)", sets: "\u2014", type: "cardio" },
      { id: "ru2", name: "Tijd (min)", sets: "\u2014", type: "cardio" },
      { id: "ru3", name: "Gevoel (1\u201310)", sets: "\u2014", type: "cardio" },
    ]
  }
];

const WEEK_PLAN = [
  { day: "Maandag", short: "Ma", session: "push" },
  { day: "Dinsdag", short: "Di", session: "pull" },
  { day: "Woensdag", short: "Wo", session: "legs" },
  { day: "Donderdag", short: "Do", session: "rest" },
  { day: "Vrijdag", short: "Vr", session: "push" },
  { day: "Zaterdag", short: "Za", session: "pull" },
  { day: "Zondag", short: "Zo", session: "run" },
];

// ── State ──
let activeSession = "push";
let activeTab = "log";
let viewingWeek = "";
let gymData = {};

function getWeekNumber(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
  const w1 = new Date(d.getFullYear(), 0, 4);
  return Math.round(((d - w1) / 86400000 + ((w1.getDay() + 6) % 7)) / 7) + 1;
}
function getWeekKey(date) {
  const d = date || new Date();
  return `w${getWeekNumber(d)}-${d.getFullYear()}`;
}
function getPrevWeekKey() {
  const d = new Date(); d.setDate(d.getDate() - 7); return getWeekKey(d);
}
function getTodaySession() {
  const map = {1:"push",2:"pull",3:"legs",4:"rest",5:"push",6:"pull",0:"run"};
  return map[new Date().getDay()] || "push";
}
function loadData() {
  try { return JSON.parse(localStorage.getItem("gym-log-v2") || "{}"); } catch { return {}; }
}
function saveData() {
  try { localStorage.setItem("gym-log-v2", JSON.stringify(gymData)); } catch {}
}
function getValue(exId, field, wk) {
  const w = wk || viewingWeek;
  return gymData?.[w]?.[activeSession]?.[exId]?.[field] || "";
}
function getPrev(exId, field) {
  return gymData?.[getPrevWeekKey()]?.[activeSession]?.[exId]?.[field] || "";
}
function setValue(exId, field, val) {
  const cw = getWeekKey();
  if (!gymData[cw]) gymData[cw] = {};
  if (!gymData[cw][activeSession]) gymData[cw][activeSession] = {};
  if (!gymData[cw][activeSession][exId]) gymData[cw][activeSession][exId] = {};
  gymData[cw][activeSession][exId][field] = val;
  saveData();
}

// ── Init ──
gymData = loadData();
const currentWeek = getWeekKey();
const todaySession = getTodaySession();
activeSession = todaySession === "rest" ? "push" : todaySession;
viewingWeek = currentWeek;

// ── Helpers ──
function el(tag, styles, attrs, ...children) {
  const e = document.createElement(tag);
  if (styles) Object.assign(e.style, styles);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "placeholder") e.placeholder = v;
      else if (k === "type") e.type = v;
      else if (k === "value") e.value = v;
      else e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c === null || c === undefined) continue;
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}
function div(styles, ...children) { return el("div", styles, null, ...children); }
function span(styles, text) { const e = el("span", styles); e.textContent = text; return e; }
function btn(styles, attrs, text) { return el("button", styles, attrs, text); }
function inp(styles, attrs) { return el("input", styles, attrs); }

// ── Render ──
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderHeader());
  if (activeTab === "log") app.appendChild(renderLog());
  if (activeTab === "week") app.appendChild(renderWeek());
  if (activeTab === "history") app.appendChild(renderHistory());
}

function renderHeader() {
  const sess = SCHEMA.find(s => s.id === activeSession);
  const todayInfo = WEEK_PLAN.find(w => w.session === todaySession);
  const todaySess = SCHEMA.find(s => s.id === todaySession);

  const todayBadge = todaySession !== "rest"
    ? div({ background: todaySess.color + "22", border: `1px solid ${todaySess.color}44`, borderRadius: "20px", padding: "5px 12px", textAlign: "center" },
        div({ fontSize: "9px", color: "#666", textTransform: "uppercase", letterSpacing: "0.1em" }, "Vandaag"),
        div({ fontSize: "13px", fontWeight: "700", color: todaySess.color }, `${todayInfo?.day} \u00b7 ${todaySess.label}`)
      )
    : div({ background: "#1a1a1a", borderRadius: "20px", padding: "5px 12px", textAlign: "center" },
        div({ fontSize: "9px", color: "#666", textTransform: "uppercase" }, "Vandaag"),
        div({ fontSize: "13px", fontWeight: "700", color: "#444" }, "Rustdag")
      );

  const topRow = div({ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" },
    div({},
      div({ fontSize: "10px", letterSpacing: "0.14em", color: "#444", textTransform: "uppercase", marginBottom: "2px" }, "Training Log"),
      div({ fontSize: "20px", fontWeight: "800", letterSpacing: "-0.02em" }, "Schema")
    ),
    todayBadge
  );

  const tabs = div({ display: "flex", gap: "2px" });
  [
    { id: "log", label: "📝 Log" },
    { id: "week", label: "📅 Week" },
    { id: "history", label: "📊 Historie" },
  ].forEach(t => {
    const isActive = activeTab === t.id;
    const b = btn({
      flex: "1", padding: "9px 6px", border: "none", fontSize: "12px", fontWeight: "600",
      cursor: "pointer", borderRadius: "8px 8px 0 0", background: isActive ? "#1a1a1a" : "transparent",
      color: isActive ? "#f0f0f0" : "#444",
      borderBottom: isActive ? `2px solid ${sess?.color || "#666"}` : "2px solid transparent"
    }, { onClick: () => { activeTab = t.id; render(); } }, t.label);
    tabs.appendChild(b);
  });

  return div({ padding: "20px 18px 0", borderBottom: "1px solid #1e1e1e" }, topRow, tabs);
}

function renderLog() {
  const sess = SCHEMA.find(s => s.id === activeSession);
  const wrap = div({ padding: "18px" });

  // Session picker
  const picker = div({ display: "flex", gap: "6px", marginBottom: "18px", flexWrap: "wrap" });
  SCHEMA.forEach(s => {
    const isActive = s.id === activeSession;
    const isToday = s.id === todaySession;
    const b = btn({
      padding: "5px 13px", borderRadius: "20px", border: "1.5px solid",
      borderColor: isActive ? s.color : isToday ? s.color + "55" : "#222",
      background: isActive ? s.color + "22" : "transparent",
      color: isActive ? s.color : isToday ? s.color + "bb" : "#555",
      fontWeight: "700", fontSize: "12px", cursor: "pointer", position: "relative"
    }, { onClick: () => { activeSession = s.id; render(); } }, s.label);
    picker.appendChild(b);
  });
  wrap.appendChild(picker);

  // Session title
  const isToday = todaySession === activeSession;
  const titleRow = div({ marginBottom: "14px" });
  const titleLine = div({ fontSize: "16px", fontWeight: "800", color: sess.color }, sess.label);
  if (isToday) titleLine.appendChild(span({ fontSize: "11px", fontWeight: "500", marginLeft: "8px", color: sess.color + "88" }, "\u2190 vandaag"));
  titleRow.appendChild(titleLine);
  titleRow.appendChild(div({ fontSize: "11px", color: "#444" }, sess.sub));
  wrap.appendChild(titleRow);

  // Exercises
  sess.exercises.forEach(ex => {
    const prevW = getPrev(ex.id, "s2_weight") || getPrev(ex.id, "s1_weight");
    const prevR = getPrev(ex.id, "s2_reps") || getPrev(ex.id, "s1_reps");
    const curW = getValue(ex.id, "s2_weight");
    const diff = prevW && curW ? (parseFloat(curW) - parseFloat(prevW)).toFixed(1) : null;

    const card = div({
      background: "#141414", borderRadius: "12px", padding: "13px 14px",
      marginBottom: "10px", borderLeft: `3px solid ${sess.color}`
    });

    // Top row
    const topRow = div({ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "10px" });
    const leftSide = div({});
    leftSide.appendChild(div({ fontWeight: "700", fontSize: "13px" }, ex.name));
    const subLine = div({ fontSize: "10px", color: "#444", marginTop: "1px" }, ex.sets);
    if (ex.type === "warmup") subLine.appendChild(span({ color: "#C47D0077", marginLeft: "6px" }, "opwarming"));
    if (ex.type === "compound") subLine.appendChild(span({ color: "#E8452C55", marginLeft: "6px" }, "nabij falen"));
    if (ex.type === "isolation") subLine.appendChild(span({ color: "#2C6BE855", marginLeft: "6px" }, "tot falen"));
    leftSide.appendChild(subLine);
    topRow.appendChild(leftSide);

    if (prevW || prevR) {
      const rightSide = div({ textAlign: "right" });
      rightSide.appendChild(div({ fontSize: "9px", color: "#444", textTransform: "uppercase", letterSpacing: "0.08em" }, "Vorige week"));
      rightSide.appendChild(div({ fontSize: "12px", color: "#666", fontFamily: "monospace" }, `${prevW ? prevW + "kg" : "\u2014"} \u00d7 ${prevR || "\u2014"}`));
      if (diff !== null && diff !== "0.0") {
        const pos = parseFloat(diff) > 0;
        rightSide.appendChild(div({ fontSize: "11px", color: pos ? "#2CB87A" : "#E8452C", fontWeight: "700" },
          (pos ? "+" : "") + diff + "kg"));
      }
      topRow.appendChild(rightSide);
    }
    card.appendChild(topRow);

    // Sets
    [1, 2].forEach(setNum => {
      const setWrap = div({ marginBottom: setNum === 1 ? "8px" : "0" });
      setWrap.appendChild(div({ fontSize: "10px", color: "#444", marginBottom: "4px", textTransform: "uppercase", letterSpacing: "0.08em" },
        `Set ${setNum}${setNum === 2 ? " \u00b7 zwaarst" : ""}`));
      const grid = div({ display: "grid", gridTemplateColumns: "1fr 1fr 1.2fr", gap: "6px" });
      ["Gewicht (kg)", "Reps", "Notitie"].forEach((label, i) => {
        const field = [`s${setNum}_weight`, `s${setNum}_reps`, `s${setNum}_note`][i];
        const col = div({});
        col.appendChild(div({ fontSize: "9px", color: "#444", marginBottom: "3px", textTransform: "uppercase" }, label));
        const input = inp({
          width: "100%", background: "#0d0d0d", border: "1px solid #222",
          borderRadius: "8px", padding: "7px 9px", color: "#f0f0f0",
          fontSize: "14px", fontFamily: "monospace"
        }, {
          type: i === 2 ? "text" : "number",
          placeholder: i === 2 ? "\u2014" : "0",
          value: getValue(ex.id, field),
          onInput: (e) => { setValue(ex.id, field, e.target.value); }
        });
        col.appendChild(input);
        grid.appendChild(col);
      });
      setWrap.appendChild(grid);
      card.appendChild(setWrap);
    });

    wrap.appendChild(card);
  });

  // Abs reminder
  if (["push","pull","legs"].includes(activeSession)) {
    wrap.appendChild(div({
      marginTop: "14px", background: "#141414", borderRadius: "10px",
      padding: "11px 13px", borderLeft: "3px solid #C47D00"
    },
      div({ fontSize: "11px", color: "#C47D00", fontWeight: "700", marginBottom: "3px" }, "\ud83d\udcaa ABS FINISHER"),
      div({ fontSize: "12px", color: "#555" }, "Cable Crunch \u00b7 Hanging Leg Raise \u00b7 Ab Wheel \u2014 2\u00d78\u201312 zwaar, log via ABS tab")
    ));
  }

  return wrap;
}

function renderWeek() {
  const wrap = div({ padding: "18px" });
  wrap.appendChild(div({ fontSize: "11px", color: "#444", marginBottom: "14px" }, "Vaste weekindeling \u00b7 elke week hetzelfde"));

  WEEK_PLAN.forEach(({ day, short, session: sid }) => {
    const s = SCHEMA.find(x => x.id === sid);
    const isRest = sid === "rest";
    const isCurrentDay = sid === todaySession;
    const hasData = !isRest && Object.keys(gymData?.[currentWeek]?.[sid] || {}).length > 0;

    const row = div({
      display: "flex", alignItems: "center", gap: "12px",
      padding: "13px 14px", background: isCurrentDay ? "#1c1c1c" : "#141414",
      borderRadius: "10px", marginBottom: "7px",
      cursor: isRest ? "default" : "pointer",
      border: isCurrentDay ? `1px solid ${s?.color}44` : "1px solid transparent",
      borderLeft: `3px solid ${isRest ? "#222" : s?.color || "#222"}`
    });
    if (!isRest) row.addEventListener("click", () => { activeSession = sid; activeTab = "log"; render(); });

    row.appendChild(div({ width: "26px", fontSize: "12px", fontWeight: "700", color: isCurrentDay ? "#fff" : "#555" }, short));
    const info = div({ flex: "1" });
    const label = div({ fontWeight: "700", fontSize: "13px", color: isRest ? "#333" : s?.color },
      isRest ? "Rustdag" : s?.label);
    if (isCurrentDay) label.appendChild(span({ fontSize: "10px", color: s?.color + "88", marginLeft: "6px" }, "\u2190 vandaag"));
    info.appendChild(label);
    if (!isRest) info.appendChild(div({ fontSize: "11px", color: "#444" }, s?.sub));
    row.appendChild(info);
    row.appendChild(div({ fontSize: hasData ? "16px" : "11px", color: hasData ? "#f0f0f0" : "#333" }, hasData ? "✓" : (isRest ? "" : "→")));
    wrap.appendChild(row);
  });

  wrap.appendChild(div({
    marginTop: "14px", background: "#141414", borderRadius: "10px",
    padding: "11px 13px", borderLeft: "3px solid #C47D00"
  },
    div({ fontSize: "11px", color: "#C47D00", fontWeight: "700", marginBottom: "3px" }, "\ud83d\udccc ABS"),
    div({ fontSize: "12px", color: "#555" }, "Finisher na Push / Pull / Legs. Log via de ABS knop in de Log tab.")
  ));

  return wrap;
}

function renderHistory() {
  const prevWeek = getPrevWeekKey();
  const allWeeks = [...new Set([currentWeek, ...Object.keys(gymData)])].sort().reverse();
  const sess = SCHEMA.find(s => s.id === activeSession);
  const wrap = div({ padding: "18px" });

  // Week selector
  const weekPicker = div({ display: "flex", gap: "6px", marginBottom: "16px", flexWrap: "wrap" });
  if (allWeeks.length === 0) {
    weekPicker.appendChild(div({ fontSize: "13px", color: "#444" }, "Nog geen data gelogd."));
  } else {
    allWeeks.forEach(wk => {
      const isActive = viewingWeek === wk;
      const label = wk === currentWeek ? "Deze week" : wk === prevWeek ? "Vorige week" : wk;
      const b = btn({
        padding: "5px 12px", borderRadius: "20px", border: "1.5px solid",
        borderColor: isActive ? "#666" : "#222",
        background: isActive ? "#222" : "transparent",
        color: isActive ? "#f0f0f0" : "#555",
        fontSize: "12px", fontWeight: "600", cursor: "pointer"
      }, { onClick: () => { viewingWeek = wk; render(); } }, label);
      weekPicker.appendChild(b);
    });
  }
  wrap.appendChild(weekPicker);

  // Session picker
  const sessPicker = div({ display: "flex", gap: "6px", marginBottom: "16px", flexWrap: "wrap" });
  SCHEMA.forEach(s => {
    const isActive = s.id === activeSession;
    const b = btn({
      padding: "5px 12px", borderRadius: "20px", border: "1.5px solid",
      borderColor: isActive ? s.color : "#222",
      background: isActive ? s.color + "22" : "transparent",
      color: isActive ? s.color : "#555",
      fontSize: "12px", fontWeight: "700", cursor: "pointer"
    }, { onClick: () => { activeSession = s.id; render(); } }, s.label);
    sessPicker.appendChild(b);
  });
  wrap.appendChild(sessPicker);

  // Entries
  sess.exercises.forEach(ex => {
    const s1w = getValue(ex.id, "s1_weight");
    const s1r = getValue(ex.id, "s1_reps");
    const s2w = getValue(ex.id, "s2_weight");
    const s2r = getValue(ex.id, "s2_reps");
    const note = getValue(ex.id, "s1_note") || getValue(ex.id, "s2_note");
    const hasAny = s1w || s1r || s2w || s2r;
    const p1w = gymData?.[prevWeek]?.[activeSession]?.[ex.id]?.s2_weight || gymData?.[prevWeek]?.[activeSession]?.[ex.id]?.s1_weight || "";
    const diff = hasAny && p1w && s2w ? (parseFloat(s2w) - parseFloat(p1w)).toFixed(1) : null;

    const card = div({
      background: "#141414", borderRadius: "11px", padding: "12px 14px",
      marginBottom: "9px", borderLeft: `3px solid ${hasAny ? sess.color : "#222"}`,
      opacity: hasAny ? "1" : "0.4"
    });

    const topRow = div({ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: hasAny ? "8px" : "0" });
    topRow.appendChild(div({ fontWeight: "700", fontSize: "13px" }, ex.name));
    if (diff !== null && diff !== "0.0") {
      const pos = parseFloat(diff) > 0;
      topRow.appendChild(div({ fontSize: "12px", fontWeight: "800", color: pos ? "#2CB87A" : "#E8452C" },
        (pos ? "\u2191 +" : "\u2193 ") + diff + "kg"));
    }
    card.appendChild(topRow);

    if (hasAny) {
      const setsRow = div({ display: "flex", gap: "10px" });
      [{label:"Set 1", w:s1w, r:s1r},{label:"Set 2", w:s2w, r:s2r}].forEach(({label, w, r}) => {
        const setBox = div({ flex: "1", background: "#0d0d0d", borderRadius: "8px", padding: "8px 10px" });
        setBox.appendChild(div({ fontSize: "10px", color: "#444", marginBottom: "4px" }, label));
        setBox.appendChild(div({ fontSize: "14px", fontFamily: "monospace", fontWeight: "700" },
          `${w ? w + "kg" : "\u2014"} \u00d7 ${r || "\u2014"}`));
        setsRow.appendChild(setBox);
      });
      card.appendChild(setsRow);
    } else {
      card.appendChild(div({ fontSize: "12px", color: "#333" }, "Niet gelogd"));
    }
    if (note) card.appendChild(div({ fontSize: "11px", color: "#555", marginTop: "6px" }, "\ud83d\udcdd " + note));
    wrap.appendChild(card);
  });

  return wrap;
}

render();
</script>
</body>
</html>
